<!doctype html>
<html lang="ko">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>간단한 할일 관리앱</title>
	<style>
		:root{
			--bg: linear-gradient(180deg,#d9f1ff 0%, #bfe9ff 100%);
			--card:#ffffff;
			--muted:#6b7280;
			--accent-start:#06b6d4;
			--accent-end:#0284c7;
			--danger:#ef4444;
			font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
		}

		html,body{height:100%;}
		body{
			margin:0;
			display:flex;
			align-items:center;
			justify-content:center;
			background:var(--bg);
			padding:32px; /* 사이드 여백 */
		}

		.app{
			width:100%;
			max-width:640px;
			background:var(--card);
			border-radius:14px;
			box-shadow:0 10px 30px rgba(2,6,23,0.08);
			padding:28px;
		}

		h1{margin:0 0 6px;font-size:22px;text-align:left;color:#052c41}
		.subtitle{margin:0 0 16px;color:var(--muted);font-size:14px}

		.input-row{display:flex;gap:10px;margin-bottom:18px}
		input[type="text"]{
			flex:1;padding:12px 14px;border:1px solid rgba(2,6,23,0.06);border-radius:10px;font-size:15px;outline:none;
			box-shadow:0 2px 6px rgba(2,6,23,0.04) inset;
		}
		input[type="text"]:focus{border-color:rgba(2,132,199,0.9);box-shadow:0 4px 18px rgba(3,105,161,0.08)}

		button{
			padding:10px 16px;border:none;border-radius:10px;background:linear-gradient(180deg,var(--accent-start),var(--accent-end));color:white;cursor:pointer;font-weight:700;font-size:14px;
		}
		button:hover{opacity:0.95}

		ul{list-style:none;padding:0;margin:0}
		li{display:flex;align-items:center;justify-content:space-between;padding:10px 8px;border-radius:8px;margin-bottom:8px;background:linear-gradient(180deg,rgba(2,6,23,0.01),transparent)}
		.task-left{display:flex;align-items:center;gap:12px}
		.task-text{font-size:15px;color:#16324f}
		.task-text.done{text-decoration:line-through;color:#9aa3b2}
		.small-btn{background:transparent;border:none;color:var(--danger);cursor:pointer;font-weight:700;font-size:16px}
		.count{margin-top:12px;font-size:13px;color:var(--muted);text-align:right}
		footer{margin-top:14px;font-size:13px;color:var(--muted);text-align:center}
	</style>
</head>
<body>
	<main class="app">
		<h1>할일 관리앱</h1>
		<p class="subtitle">중요한 일을 잊지 않도록 추가하고, 완료되면 체크하세요 — 원할 경우 항목을 삭제할 수 있습니다.</p>
		<div class="input-row">
			<input id="taskInput" type="text" placeholder="새 할일을 입력하세요" />
			<button id="addBtn">추가</button>
		</div>
		<ul id="taskList"></ul>
		<div class="count" id="taskCount"></div>
		<footer>간단한 예제 — 체크하면 완료, 쓰레기통으로 삭제합니다.</footer>
	</main>

	<script>
		// 간단한 데이터 구조: [{ text: '할일', done: false }, ...]
		const TASKS_KEY = 'simple_todos_v1'
		let tasks = []

		const taskInput = document.getElementById('taskInput')
		const addBtn = document.getElementById('addBtn')
		const taskList = document.getElementById('taskList')
		const taskCount = document.getElementById('taskCount')

		// 로컬 스토리지에서 불러오기
		function loadTasks(){
			try{
				const raw = localStorage.getItem(TASKS_KEY)
				tasks = raw ? JSON.parse(raw) : []
			}catch(e){ tasks = [] }
		}

		function saveTasks(){
			localStorage.setItem(TASKS_KEY, JSON.stringify(tasks))
		}

		// 화면에 렌더링
		function render(){
			taskList.innerHTML = ''
			tasks.forEach((t, idx) => {
				const li = document.createElement('li')

				const left = document.createElement('div')
				left.className = 'task-left'

				const cb = document.createElement('input')
				cb.type = 'checkbox'
				cb.checked = !!t.done
				cb.addEventListener('change', () => toggleDone(idx))

				const span = document.createElement('span')
				span.className = 'task-text' + (t.done ? ' done' : '')
				span.textContent = t.text

				left.appendChild(cb)
				left.appendChild(span)

				const del = document.createElement('button')
				del.className = 'small-btn'
				del.textContent = '🗑'
				del.title = '삭제'
				del.addEventListener('click', () => removeTask(idx))

				li.appendChild(left)
				li.appendChild(del)
				taskList.appendChild(li)
			})

			const remaining = tasks.filter(t=>!t.done).length
			const total = tasks.length
			taskCount.textContent = `남은 항목: ${remaining} / 전체: ${total}`
			saveTasks()
		}

		function addTask(){
			const text = taskInput.value.trim()
			if(!text) return
			tasks.push({text, done:false})
			taskInput.value = ''
			render()
		}

		function toggleDone(index){
			if(tasks[index]){
				tasks[index].done = !tasks[index].done
				render()
			}
		}

		function removeTask(index){
			tasks.splice(index,1)
			render()
		}

		// 단축키: Enter로 추가
		taskInput.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') addTask() })
		addBtn.addEventListener('click', addTask)

		// 초기 실행
		loadTasks()
		render()
	</script>
</body>
</html>
